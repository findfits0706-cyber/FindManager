services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-findmanager}
      POSTGRES_USER: ${POSTGRES_USER:-findmanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-findmanager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-findmanager} -d ${POSTGRES_DB:-findmanager}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    command: >-
      sh -c "python manage.py migrate --noinput &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --access-logfile -"
    environment:
      DJANGO_ENVIRONMENT: development
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-compose-development-secret-key-change-before-production}
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost:5173
      FRONTEND_ORIGIN: http://localhost:5173
      POSTGRES_DB: ${POSTGRES_DB:-findmanager}
      POSTGRES_USER: ${POSTGRES_USER:-findmanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-findmanager}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      SESSION_COOKIE_SECURE: "0"
      CSRF_COOKIE_SECURE: "0"
      SECURE_SSL_REDIRECT: "0"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/readiness/', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        VITE_APP_VERSION: 1.0.0-rc1
    ports:
      - "5173:8080"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
