name: CI

on:
  push:
    branches:
      - main
      - "fix/**"
      - "phase/**"
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: findmanager_test
          POSTGRES_USER: findmanager
          POSTGRES_PASSWORD: findmanager
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U findmanager -d findmanager_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    defaults:
      run:
        working-directory: backend
    env:
      POSTGRES_DB: findmanager_test
      POSTGRES_USER: findmanager
      POSTGRES_PASSWORD: findmanager
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: 0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Pytest
        run: pytest
      - name: Makemigrations check
        run: python manage.py makemigrations --check
      - name: Django check
        run: python manage.py check

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm run test -- --run
      - name: Build
        run: npm run build
