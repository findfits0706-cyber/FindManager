name: CI

on:
  push:
    branches:
      - main
      - "fix/**"
      - "phase/**"
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: findmanager_test
          POSTGRES_USER: findmanager
          POSTGRES_PASSWORD: findmanager
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U findmanager -d findmanager_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    defaults:
      run:
        working-directory: backend
    env:
      POSTGRES_DB: findmanager_test
      POSTGRES_USER: findmanager
      POSTGRES_PASSWORD: findmanager
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      DJANGO_SECRET_KEY: ci-test-secret-key-with-more-than-thirty-two-characters
      DJANGO_DEBUG: "0"
      DJANGO_ENVIRONMENT: test
      DJANGO_ALLOWED_HOSTS: testserver,localhost,127.0.0.1
      DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost:5173
      FRONTEND_ORIGIN: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Pytest
        run: pytest
      - name: Makemigrations check
        run: python manage.py makemigrations --check
      - name: Django check
        run: python manage.py check
      - name: Python dependency audit
        run: pip-audit
      - name: Production deployment checks
        env:
          DJANGO_ENVIRONMENT: production
          DJANGO_ALLOWED_HOSTS: manager.example.invalid
          DJANGO_CSRF_TRUSTED_ORIGINS: https://manager.example.invalid
          FRONTEND_ORIGIN: https://manager.example.invalid
          SESSION_COOKIE_SECURE: "1"
          CSRF_COOKIE_SECURE: "1"
          SECURE_SSL_REDIRECT: "1"
          SECURE_HSTS_SECONDS: "31536000"
          SECURE_HSTS_INCLUDE_SUBDOMAINS: "1"
          SECURE_HSTS_PRELOAD: "1"
          SECURE_PROXY_SSL_HEADER: HTTP_X_FORWARDED_PROTO,https
        run: |
          python manage.py migrate --noinput
          python manage.py check --deploy --tag security
          python manage.py check_deployment_readiness --settings-only

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test -- --run
      - name: Build
        env:
          VITE_APP_VERSION: 1.0.0-rc1
        run: npm run build
      - name: Frontend dependency audit
        run: npm audit --audit-level=low

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: findmanager_e2e
          POSTGRES_USER: findmanager
          POSTGRES_PASSWORD: findmanager
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U findmanager -d findmanager_e2e"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      POSTGRES_DB: findmanager_e2e
      POSTGRES_USER: findmanager
      POSTGRES_PASSWORD: findmanager
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      DJANGO_SECRET_KEY: e2e-secret-key-with-more-than-thirty-two-characters
      DJANGO_DEBUG: "1"
      DJANGO_ENVIRONMENT: test
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_CSRF_TRUSTED_ORIGINS: http://127.0.0.1:5173
      FRONTEND_ORIGIN: http://127.0.0.1:5173
      DJANGO_LOGIN_THROTTLE_RATE: 100/min
      DEV_SEED_PASSWORD: DevPassword123!
      DEV_SEED_RESET_PASSWORDS: "1"
      E2E_PASSWORD: DevPassword123!
      E2E_BASE_URL: http://127.0.0.1:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "backend[dev]"
          npm ci --prefix frontend
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Prepare E2E database
        run: |
          python backend/manage.py migrate --noinput
          python backend/manage.py seed_e2e
      - name: Start Backend and Frontend
        run: |
          python backend/manage.py runserver 127.0.0.1:8000 --noreload > backend-e2e.log 2>&1 &
          npm run dev --prefix frontend -- --host 127.0.0.1 --port 5173 > frontend-e2e.log 2>&1 &
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:8000/api/v1/readiness/ && break
            sleep 2
          done
          curl --fail http://127.0.0.1:8000/api/v1/readiness/
          curl --fail http://127.0.0.1:5173/
      - name: Playwright workflows
        working-directory: frontend
        run: npm run e2e
      - name: Upload E2E diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          if-no-files-found: ignore
          path: |
            frontend/test-results
            frontend/playwright-report
            backend-e2e.log
            frontend-e2e.log

  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose
        run: docker compose config
      - name: Build Backend image
        run: docker build --tag findmanager-backend:ci backend
      - name: Build Frontend image
        run: docker build --build-arg VITE_APP_VERSION=1.0.0-rc1 --tag findmanager-frontend:ci frontend
