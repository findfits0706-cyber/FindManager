services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-findmanager}
      POSTGRES_USER: ${POSTGRES_USER:-findmanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-findmanager}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: python:3.13-slim
    working_dir: /app/backend
    command: >
      sh -c "pip install -e .[dev] &&
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    image: node:24-bookworm
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
